<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced Smart Stadium Simulation</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Inter', 'Segoe UI', sans-serif; background: #000000; user-select: none; }
        
        /* Navigation Helper */
        #nav-help { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 8px 18px; border-radius: 20px; color: #ddd; font-size: 12px; font-weight: 500; pointer-events: none; z-index: 10; backdrop-filter: blur(8px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); letter-spacing: 0.5px; }
        .key { background: #333; color: #fff; padding: 3px 7px; border-radius: 4px; margin: 0 3px; border: 1px solid #555; }

        /* Minimap Radar */
        #minimap-container { position: absolute; bottom: 30px; left: 20px; width: 160px; height: 160px; background: rgba(0, 10, 20, 0.8); border: 2px solid #2a3143; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 10; overflow: hidden; pointer-events: none; }
        #minimap { width: 100%; height: 100%; }
        .minimap-label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); color: #66a3ff; font-size: 10px; font-weight: bold; font-family: monospace; letter-spacing: 1px; }

        /* UI PANEL GLOBALS */
        .panel { position: absolute; box-sizing: border-box; width: 320px; pointer-events: none; z-index: 10; border-radius: 12px; padding: 20px; }
        .panel h2 { margin: 0 0 15px 0; font-size: 13px; text-transform: uppercase; color: #66a3ff; letter-spacing: 1.5px; border-bottom: 1px solid #2a3143; padding-bottom: 10px; }

        /* MANAGEMENT TERMINAL (Left) */
        #admin-ui { top: 80px; left: 20px; background: rgba(15, 18, 25, 0.95); border: 1px solid #2a3143; border-top: 4px solid #0066cc; color: #e0e0e0; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .gate-status { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; font-family: 'Courier New', monospace; background: #151922; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #555; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px currentColor; }
        #admin-log { margin-top: 15px; height: 100px; overflow-y: auto; font-size: 11px; font-family: 'Courier New', monospace; color: #8ba2c4; display: flex; flex-direction: column-reverse; background: #0b0d13; padding: 12px; border-radius: 8px; border: 1px solid #1a1f2e; line-height: 1.6; }
        
        /* LIVE GRAPH */
        .graph-title { font-size: 10px; color: #8ba2c4; margin-top: 15px; margin-bottom: 5px; text-transform: uppercase; font-weight: bold; }
        #ingress-graph { width: 100%; height: 60px; background: #0b0d13; border: 1px solid #1a1f2e; border-radius: 6px; }

        /* SETTINGS TOGGLE & MENU (Top Right) */
        #settings-toggle { position: absolute; top: 20px; right: 20px; z-index: 11; background: #1f2937; border: 1px solid #8ba2c4; padding: 12px 20px; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 12px; transition: 0.2s; pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        #settings-toggle:hover { background: #374151; transform: translateY(-2px); }
        
        #settings-ui { top: 75px; right: 20px; background: rgba(15, 18, 25, 0.95); border: 1px solid #2a3143; border-top: 4px solid #8ba2c4; color: #e0e0e0; box-shadow: 0 15px 35px rgba(0,0,0,0.7); pointer-events: auto; display: none; }
        .setting-row { margin-bottom: 10px; }
        .setting-row label { display: block; font-size: 11px; font-weight: 700; color: #8ba2c4; margin-bottom: 5px; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: #0066cc; cursor: pointer; }

        /* SMART FAN PASS APP (Right) */
        #user-ui { top: 80px; right: 20px; background: rgba(255, 255, 255, 0.98); border-radius: 28px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); border: 6px solid #111; padding-top: 28px; color: #111; transition: top 0.3s ease; }
        #user-ui::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 100px; height: 20px; background: #111; border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
        #user-ui h2 { color: #111; font-weight: 800; text-align: center; border-bottom: 1px solid #eee; }
        
        #app-notifications { display: flex; flex-direction: column; gap: 12px; }
        .app-msg { background: #ffffff; border-radius: 16px; padding: 14px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); display: flex; align-items: flex-start; gap: 12px; border: 1px solid #f0f0f0; border-left: 4px solid #10b981; animation: slideIn 0.4s ease forwards; }
        .app-msg.alert { border-left-color: #f59e0b; background: #fffbeb; }
        .app-msg.critical { border-left-color: #ef4444; background: #fef2f2; }
        
        .icon-box { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .icon-green { background: #d1fae5; color: #059669; }
        .icon-yellow { background: #fef3c7; color: #d97706; }
        .icon-red { background: #fee2e2; color: #dc2626; }
        
        .msg-content { flex: 1; }
        .msg-title { font-weight: 700; font-size: 13px; color: #1f2937; margin-bottom: 4px; }
        .msg-desc { font-size: 12px; color: #4b5563; line-height: 1.4; }
        .msg-time { font-size: 10px; color: #9ca3af; margin-top: 6px; display: block; font-weight: 600; }

        /* CONTROLS (Bottom) */
        #controls-wrapper { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(20, 24, 34, 0.95); padding: 15px 25px; border-radius: 16px; border: 1px solid #333c52; box-shadow: 0 15px 40px rgba(0,0,0,0.8); z-index: 10; display: flex; gap: 20px; align-items: center; pointer-events: auto; backdrop-filter: blur(10px); }
        
        .ctrl-group { display: flex; align-items: center; gap: 10px; background: #0f121a; padding: 10px 15px; border-radius: 8px; border: 1px solid #232a3b; }
        label { font-size: 11px; font-weight: 700; color: #8ba2c4; text-transform: uppercase; letter-spacing: 0.5px;}
        input[type="range"] { cursor: pointer; width: 120px; accent-color: #0066cc; }
        
        button { padding: 10px 14px; font-size: 11px; font-weight: 800; cursor: pointer; color: white; border: none; border-radius: 6px; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn-normal { background: #2a3143; border: 1px solid #3b455e; height: 100%; padding: 15px 20px; }
        .btn-normal:hover { background: #3b455e; transform: translateY(-2px); }
        .btn-cam { background: #0066cc; border: none; padding: 8px 12px; }
        .btn-cam:hover { background: #3388ff; transform: translateY(-2px); }
        
        .gate-btns { display: flex; gap: 5px; }
        .btn-surge { background: #ef4444; }
        .btn-surge:hover { background: #dc2626; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); transform: translateY(-2px); }
        
        .btn-reset { background: #f59e0b; margin-left: 10px;}
        .btn-reset:hover { background: #d97706; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);}
        
        .btn-evac { background: #dc2626; border: 2px solid #ef4444; margin-left: 10px; animation: pulse 2s infinite; }
        .btn-evac:hover { background: #991b1b; transform: scale(1.05); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
    
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="nav-help">
        Walk: <span class="key">W</span> <span class="key">A</span> <span class="key">S</span> <span class="key">D</span> &nbsp;|&nbsp; 
        Look: <span class="key">Left Click + Drag</span>
    </div>

    <div id="minimap-container">
        <div class="minimap-label">LIVE RADAR</div>
        <canvas id="minimap" width="160" height="160"></canvas>
    </div>

    <div id="admin-ui" class="panel">
        <h2>STADIUM COMMAND</h2>
        <div id="gate-status-container"></div>
        <div class="graph-title">Live Ingress Rate (Fans/sec)</div>
        <canvas id="ingress-graph"></canvas>
        <div id="admin-log"></div>
    </div>

    <button id="settings-toggle">⚙️ Settings</button>
    <div id="settings-ui" class="panel">
        <h2>⚙️ SIMULATION SETTINGS</h2>
        <div class="setting-row">
            <label>Camera Sensitivity: <span id="sens-val">1.0</span>x</label>
            <input type="range" id="sens-slider" min="0.1" max="2.0" step="0.1" value="1.0">
        </div>
        <div class="setting-row">
            <label>Sim Speed: <span id="speed-val">1.0</span>x</label>
            <input type="range" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.0">
        </div>
    </div>

    <div id="user-ui" class="panel">
        <h2>Smart Fan Pass</h2>
        <div id="app-notifications">
            <div class="app-msg">
                <div class="icon-box icon-green">✔</div>
                <div class="msg-content">
                    <div class="msg-title">Ticket Verified</div>
                    <div class="msg-desc">Welcome! Enjoy the game.</div>
                    <span class="msg-time">System</span>
                </div>
            </div>
        </div>
    </div>
    
    <div id="controls-wrapper">
        <div class="ctrl-group" style="margin-right: 10px;">
            <label style="font-size: 9px;">CCTV Presets</label>
            <button class="btn-cam" id="cam-drone">Drone</button>
            <button class="btn-cam" id="cam-pitch">Pitch</button>
            <button class="btn-cam" id="cam-g1">Gate 1</button>
        </div>
        
        <button id="btn-routine" class="btn-normal">Arrive Routine</button>
        <div style="width: 1px; height: 30px; background: #333c52;"></div>
        
        <div class="ctrl-group">
            <label>Surge Amount: <span id="surge-val" style="color:#fff;">50</span></label>
            <input type="range" id="surge-slider" min="10" max="150" step="10" value="50">
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 5px;">
            <label style="font-size: 10px; margin-bottom: 2px;">Force Crowd Surge To:</label>
            <div class="gate-btns">
                <button class="btn-surge" id="btn-g1">G 1</button>
                <button class="btn-surge" id="btn-g2">G 2</button>
                <button class="btn-surge" id="btn-g3">G 3</button>
                <button class="btn-surge" id="btn-g4">G 4</button>
                <button class="btn-surge" id="btn-g5">G 5</button>
            </div>
        </div>
        <div style="width: 1px; height: 30px; background: #333c52;"></div>
        <button id="btn-reset" class="btn-reset">Reset</button>
        <button id="btn-evac" class="btn-evac">⚠ EVACUATE</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ==========================================
        // UI TOGGLE LOGIC & GLOBALS
        // ==========================================
        document.getElementById('settings-toggle').addEventListener('click', () => {
            const settingsMenu = document.getElementById('settings-ui');
            const userApp = document.getElementById('user-ui');
            if (settingsMenu.style.display === 'none' || settingsMenu.style.display === '') {
                settingsMenu.style.display = 'block'; userApp.style.top = '190px'; 
            } else {
                settingsMenu.style.display = 'none'; userApp.style.top = '80px'; 
            }
        });

        let isEvacuating = false;

        // ==========================================
        // 1. SCENE SETUP & STATIC LIGHTING
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x5da8e3); 
        scene.fog = new THREE.FogExp2(0x5da8e3, 0.0003);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 8000);
        camera.position.set(0, 300, 750);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.02; controls.maxDistance = 3000; 
        
        let camSensitivity = 1.0; let simSpeed = 1.0;
        document.getElementById('sens-slider').addEventListener('input', (e) => { camSensitivity = parseFloat(e.target.value); document.getElementById('sens-val').innerText = camSensitivity.toFixed(1); });
        document.getElementById('speed-slider').addEventListener('input', (e) => { simSpeed = parseFloat(e.target.value); document.getElementById('speed-val').innerText = simSpeed.toFixed(1); });
        
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        document.getElementById('surge-slider').addEventListener('input', (e) => { document.getElementById('surge-val').innerText = e.target.value; });

        // Static Daylight
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(500, 800, 300); sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048; sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.bias = -0.0005; 
        const d = 1000; sunLight.shadow.camera.left = -d; sunLight.shadow.camera.right = d; sunLight.shadow.camera.top = d; sunLight.shadow.camera.bottom = -d;
        scene.add(sunLight);

        // Clouds
        const cloudGroup = new THREE.Group();
        const cloudGeo = new THREE.BoxGeometry(30, 20, 30);
        const cloudMat = new THREE.MeshLambertMaterial({color: 0xffffff});
        for(let i=0; i<30; i++) {
            const cluster = new THREE.Group();
            for(let p=0; p<4; p++) {
                const puff = new THREE.Mesh(cloudGeo, cloudMat);
                puff.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*10, (Math.random()-0.5)*60);
                const s = 1 + Math.random()*2; puff.scale.set(s, 0.5, s); cluster.add(puff);
            }
            cluster.position.set((Math.random()-0.5)*4000, 500 + Math.random()*150, (Math.random()-0.5)*4000);
            cloudGroup.add(cluster);
        }
        scene.add(cloudGroup);

        // ==========================================
        // 2. SOLID ARCHITECTURE & OPEN ROOF
        // ==========================================
        const baseGround = new THREE.Mesh(new THREE.PlaneGeometry(6000, 6000), new THREE.MeshStandardMaterial({ color: 0x3a7533, roughness: 1.0 }));
        baseGround.rotation.x = -Math.PI / 2; baseGround.position.y = -0.1; baseGround.receiveShadow = true; scene.add(baseGround);

        const wallMat = new THREE.MeshStandardMaterial({color: 0x4a5568, roughness: 0.8});
        const wallN = new THREE.Mesh(new THREE.BoxGeometry(2000, 40, 10), wallMat); wallN.position.set(0, 20, -1000); wallN.castShadow=true;
        const wallS = new THREE.Mesh(new THREE.BoxGeometry(2000, 40, 10), wallMat); wallS.position.set(0, 20, 1000); wallS.castShadow=true;
        const wallE = new THREE.Mesh(new THREE.BoxGeometry(10, 40, 2000), wallMat); wallE.position.set(1000, 20, 0); wallE.castShadow=true;
        const wallW1 = new THREE.Mesh(new THREE.BoxGeometry(10, 40, 800), wallMat); wallW1.position.set(-1000, 20, -600); wallW1.castShadow=true;
        const wallW2 = new THREE.Mesh(new THREE.BoxGeometry(10, 40, 800), wallMat); wallW2.position.set(-1000, 20, 600); wallW2.castShadow=true;
        scene.add(wallN, wallS, wallE, wallW1, wallW2);

        const roadMat = new THREE.MeshStandardMaterial({color: 0x333333, roughness: 0.9});
        const ringRoad = new THREE.Mesh(new THREE.RingGeometry(390, 480, 128), roadMat);
        ringRoad.rotation.x = -Math.PI/2; ringRoad.position.y = 0.1; ringRoad.receiveShadow = true; scene.add(ringRoad);

        const muralCanvas = document.createElement('canvas'); muralCanvas.width = 1024; muralCanvas.height = 256;
        const mCtx = muralCanvas.getContext('2d'); mCtx.fillStyle = '#e5e7eb'; mCtx.fillRect(0,0,1024,256);
        mCtx.fillStyle = '#b0b8c4'; mCtx.font = 'bold 70px Arial'; mCtx.textAlign = 'center'; mCtx.fillText("🏏 CRICKET    ⚽ FOOTBALL", 512, 150);
        const muralTex = new THREE.CanvasTexture(muralCanvas); muralTex.wrapS = THREE.RepeatWrapping; muralTex.repeat.set(10, 1);

        const stadiumGroup = new THREE.Group();
        const hullGeo = new THREE.CylinderGeometry(320, 280, 80, 128, 1, true); 
        const hullMat = new THREE.MeshStandardMaterial({map: muralTex, color: 0xe5e7eb, roughness: 0.8, side: THREE.DoubleSide });
        const outerHull = new THREE.Mesh(hullGeo, hullMat);
        outerHull.position.y = 40; outerHull.receiveShadow = true; outerHull.castShadow = true; stadiumGroup.add(outerHull);

        const roofGeo = new THREE.RingGeometry(290, 330, 128);
        const roofMat = new THREE.MeshStandardMaterial({color: 0xf3f4f6, roughness: 0.5, side: THREE.DoubleSide});
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.rotation.x = -Math.PI/2; roof.position.y = 80; roof.receiveShadow = true; roof.castShadow = true; stadiumGroup.add(roof);

        const seatColors = [0x1f2937, 0x374151, 0x4b5563];
        for(let i=0; i<3; i++) {
            const inner = 120 + i*40; const outer = 160 + i*40; const h = 15 + i*20;
            const tier = new THREE.Mesh(new THREE.RingGeometry(inner, outer, 128), new THREE.MeshStandardMaterial({color: seatColors[i]}));
            tier.rotation.x = -Math.PI/2; tier.position.y = h; tier.receiveShadow = true; stadiumGroup.add(tier);
            const drop = new THREE.Mesh(new THREE.CylinderGeometry(inner, inner, h, 128, 1, true), new THREE.MeshStandardMaterial({color: 0xe5e7eb}));
            drop.position.y = h/2; drop.receiveShadow = true; stadiumGroup.add(drop);
        }

        // ==========================================
        // 3. FOOD STALLS (Dynamic Bottlenecks)
        // ==========================================
        const concessions = [];
        function createConcessionStand(x, z, angle) {
            const stand = new THREE.Group();
            const counter = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 10), new THREE.MeshStandardMaterial({color: 0xffffff}));
            counter.position.y = 5; counter.castShadow = true; stand.add(counter);
            
            const awning = new THREE.Mesh(new THREE.PlaneGeometry(22, 12), new THREE.MeshStandardMaterial({color: 0xef4444, side: THREE.DoubleSide}));
            awning.rotation.x = -Math.PI/2.5; awning.position.set(0, 15, 2); awning.castShadow = true; stand.add(awning);
            
            const pole1 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 15), new THREE.MeshStandardMaterial({color: 0x555555}));
            pole1.position.set(-9, 7.5, -4); stand.add(pole1);
            const pole2 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 15), new THREE.MeshStandardMaterial({color: 0x555555}));
            pole2.position.set(9, 7.5, -4); stand.add(pole2);
            
            stand.position.set(x, 0, z); stand.rotation.y = angle; scene.add(stand);
            
            // Interaction point slightly in front of the counter
            const interactPos = new THREE.Vector3(x + Math.sin(angle)*15, 0, z + Math.cos(angle)*15);
            concessions.push({ mesh: stand, interactPos: interactPos });
        }
        
        // Place 4 stands around the outer road
        createConcessionStand(0, 435, 0); createConcessionStand(0, -435, Math.PI);
        createConcessionStand(435, 0, Math.PI/2); createConcessionStand(-435, 0, -Math.PI/2);

        // ==========================================
        // 4. LIVE JUMBOTRON & CRICKET FIELD
        // ==========================================
        const jumboCanvas = document.createElement('canvas'); jumboCanvas.width = 512; jumboCanvas.height = 256;
        const jCtx = jumboCanvas.getContext('2d'); const jumboTex = new THREE.CanvasTexture(jumboCanvas);
        const jumbotron = new THREE.Mesh(new THREE.BoxGeometry(80, 40, 5), new THREE.MeshBasicMaterial({map: jumboTex}));
        jumbotron.position.set(0, 80, -220); stadiumGroup.add(jumbotron);

        function updateJumbotron(seatedFans) {
            jCtx.fillStyle = '#050a15'; jCtx.fillRect(0,0,512,256); jCtx.strokeStyle = '#0066cc'; jCtx.lineWidth = 10; jCtx.strokeRect(0,0,512,256);
            jCtx.fillStyle = isEvacuating ? '#ef4444' : '#10b981'; jCtx.font = 'bold 35px Arial'; jCtx.textAlign = 'center';
            jCtx.fillText(isEvacuating ? '⚠ EVACUATE ⚠' : '🔴 LIVE MATCH', 256, 60);
            jCtx.fillStyle = '#ffffff'; jCtx.font = 'bold 60px Arial'; jCtx.fillText(isEvacuating ? 'PROCEED TO' : 'IND 184 / 2', 256, 140);
            jCtx.fillStyle = '#f59e0b'; jCtx.font = 'bold 30px Arial'; jCtx.fillText(isEvacuating ? 'NEAREST EXIT' : `FANS IN SEATS: ${seatedFans}`, 256, 210);
            jumboTex.needsUpdate = true;
        }
        updateJumbotron(0);

        const field = new THREE.Mesh(new THREE.CylinderGeometry(120, 120, 2, 64), new THREE.MeshStandardMaterial({color: 0x3a7533}));
        field.position.y = 1; field.receiveShadow = true; stadiumGroup.add(field);

        const lineMat = new THREE.MeshBasicMaterial({color: 0xffffff, side: THREE.DoubleSide});
        const boundaryLine = new THREE.Mesh(new THREE.RingGeometry(115, 116, 64), lineMat);
        boundaryLine.rotation.x = -Math.PI / 2; boundaryLine.position.y = 2.1; stadiumGroup.add(boundaryLine);
        const thirtyYardLine = new THREE.Mesh(new THREE.RingGeometry(60, 61, 64), lineMat);
        thirtyYardLine.rotation.x = -Math.PI / 2; thirtyYardLine.position.y = 2.1; stadiumGroup.add(thirtyYardLine);

        const clayPitch = new THREE.Mesh(new THREE.BoxGeometry(35, 2.5, 10), new THREE.MeshStandardMaterial({ color: 0xd2b48c }));
        clayPitch.position.y = 1; clayPitch.receiveShadow = true; stadiumGroup.add(clayPitch);

        const creaseMat = new THREE.MeshBasicMaterial({color: 0xffffff});
        const poppingCrease1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2.6, 10), creaseMat);
        poppingCrease1.position.set(-12, 1, 0); stadiumGroup.add(poppingCrease1);

        function createHumanRig(type = 'fan', isVIP = false) {
            const group = new THREE.Group();
            const skinColors = [0xffdcb1, 0xe5c298, 0xe4b98e, 0xb48a66, 0x8d5524, 0x3c2e28];
            const skinMat = new THREE.MeshStandardMaterial({color: skinColors[Math.floor(Math.random()*skinColors.length)], roughness: 0.6});
            let sColor = Math.random() * 0xffffff; if (type === 'player') sColor = 0x0055aa; if (isVIP) sColor = 0xf59e0b; 
            const shirtMat = new THREE.MeshStandardMaterial({color: sColor, roughness: 0.8});
            const pantsMat = new THREE.MeshStandardMaterial({color: type === 'player' ? 0xffffff : 0x1f2937, roughness: 0.9}); 
            const torso = new THREE.Mesh(new THREE.BoxGeometry(1.4, 2.2, 0.8), shirtMat); torso.position.y = 3.3; torso.castShadow = true; group.add(torso);
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.1, 1.0), skinMat); head.position.y = 5.0; head.castShadow = true; group.add(head);

            const createLimb = (w, h, d, mat) => { const geo = new THREE.BoxGeometry(w, h, d); geo.translate(0, -h/2, 0); const mesh = new THREE.Mesh(geo, mat); mesh.castShadow = true; return mesh; };
            const lArm = createLimb(0.4, 2.0, 0.4, skinMat); lArm.position.set(-0.9, 4.3, 0); group.add(lArm);
            const rArm = createLimb(0.4, 2.0, 0.4, skinMat); rArm.position.set(0.9, 4.3, 0); group.add(rArm);
            const lLeg = createLimb(0.5, 2.2, 0.5, pantsMat); lLeg.position.set(-0.4, 2.2, 0); group.add(lLeg);
            const rLeg = createLimb(0.5, 2.2, 0.5, pantsMat); rLeg.position.set(0.4, 2.2, 0); group.add(rLeg);

            group.scale.set(0.8, 0.8, 0.8); return { group, lArm, rArm, lLeg, rLeg };
        }

            gates.push({ id: i+1, angle: angle, position: new THREE.Vector3(gx, 0, gz), indicator: indicator, queueStart: new THREE.Vector3(Math.cos(angle)*(gRadius+queueLength+10), 0, Math.sin(angle)*(gRadius+queueLength+10)), crowdDensity: 0, status: 'green', alertTriggered: false });

        // ==========================================
        // 9. CROWD AGENT SPAWNING
        // ==========================================
        const agents = [];

        function spawnAgents(amount, targetGateIndex = null, spawnPos = null) {
            if(isEvacuating) return; // Don't spawn if evacuating
            for(let i=0; i<amount; i++) {
                let isVIP = Math.random() > 0.85; 
                const rig = createHumanRig('fan', isVIP);
                const gate = targetGateIndex !== null ? gates[targetGateIndex] : gates[Math.floor(Math.random() * gates.length)];
                
                if (spawnPos) { rig.group.position.set(spawnPos.x + (Math.random()-0.5)*10, 0, spawnPos.z + (Math.random()-0.5)*10); } 
                else { rig.group.position.set(gate.queueStart.x + (Math.random()-0.5)*200, 0, gate.queueStart.z + (Math.random()-0.5)*200); }
                
                scene.add(rig.group);
                
                // Concession Detour Logic
                let wantsFood = !isVIP && Math.random() > 0.7; // 30% of normal fans want food
                let targetConcession = null;
                if(wantsFood) {
                    targetConcession = concessions[Math.floor(Math.random() * concessions.length)];
                }

                agents.push({ 
                    rig: rig, mesh: rig.group, speed: (12 + Math.random()*6) * (isVIP ? 1.3 : 1.0), 
                    targetGate: gate, phase: 'APPROACH_QUEUE', animOffset: Math.random()*10,
                    rerouteCooldown: 0, isVIP: isVIP, securityWait: undefined,
                    wantsFood: wantsFood, hasEaten: false, targetConcession: targetConcession, foodWait: 2.0 + Math.random()*3.0,
                    evacTarget: null
                });
            }
        }

        document.getElementById('btn-routine').addEventListener('click', () => spawnAgents(30));
        for(let i=0; i<5; i++) { document.getElementById(`btn-g${i+1}`).addEventListener('click', () => { const amt = parseInt(document.getElementById('surge-slider').value); logAdmin(`CRITICAL: Sudden surge of ${amt} fans expected at Gate ${i+1}`, true); spawnAgents(amt, i); }); }

        document.getElementById('btn-reset').addEventListener('click', () => {
            isEvacuating = false;
            agents.forEach(a => scene.remove(a.mesh)); agents.length = 0; 
            gates.forEach(g => { g.crowdDensity = 0; g.status = 'green'; g.alertTriggered = false; g.indicator.material.color.setHex(0x10b981); g.indicator.material.emissive.setHex(0x10b981); });
            document.getElementById('admin-log').innerHTML = ''; logAdmin("System Reset Complete.");
            // Reset App UI
            document.getElementById('user-ui').innerHTML = '<h2>Smart Fan Pass</h2><div id="app-notifications"><div class="app-msg"><div class="icon-box icon-green">✔</div><div class="msg-content"><div class="msg-title">System Reset</div><div class="msg-desc">Simulation cleared.</div><span class="msg-time">Just now</span></div></div></div>';
            updateAdminDashboard();

        // ==========================================
        // 10. MAIN LOOP & ADVANCED LOGIC
        // ==========================================
        const clock = new THREE.Clock();
        const miniCtx = document.getElementById('minimap').getContext('2d');
        const graphCtx = document.getElementById('ingress-graph').getContext('2d');

        let carSpawnTimer = 0;
        let jumboTimer = 0;
        let graphTimer = 0;
        let newlySeatedCount = 0;
        const ingressHistory = new Array(30).fill(0);

        function handleKeyboardMovement(delta) {
            const moveSpeed = 400 * camSensitivity * delta; controls.rotateSpeed = camSensitivity;
            const forward = new THREE.Vector3(); camera.getWorldDirection(forward); forward.y = 0; forward.normalize();
            const right = new THREE.Vector3(); right.crossVectors(forward, camera.up).normalize();
            if(keys.w) { camera.position.addScaledVector(forward, moveSpeed); controls.target.addScaledVector(forward, moveSpeed); }
            if(keys.s) { camera.position.addScaledVector(forward, -moveSpeed); controls.target.addScaledVector(forward, -moveSpeed); }
            if(keys.a) { camera.position.addScaledVector(right, -moveSpeed); controls.target.addScaledVector(right, -moveSpeed); }
            if(keys.d) { camera.position.addScaledVector(right, moveSpeed); controls.target.addScaledVector(right, moveSpeed); }
        }

        // Live Ingress Graph Drawer
        function drawGraph() {
            graphCtx.clearRect(0, 0, 300, 60);
            graphCtx.beginPath();
            const maxVal = Math.max(...ingressHistory, 10); // scale graph
            for(let i=0; i<ingressHistory.length; i++) {
                const x = (i / (ingressHistory.length - 1)) * 300;
                const y = 60 - ((ingressHistory[i] / maxVal) * 50);
                if(i===0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
            }
            graphCtx.strokeStyle = '#0066cc'; graphCtx.lineWidth = 2; graphCtx.stroke();
            
            // Fill under line
            graphCtx.lineTo(300, 60); graphCtx.lineTo(0, 60);
            graphCtx.fillStyle = 'rgba(0, 102, 204, 0.2)'; graphCtx.fill();
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1) * simSpeed;
            const time = clock.getElapsedTime() * simSpeed;

            handleKeyboardMovement(delta);

            cloudGroup.children.forEach(c => { c.position.x -= 5 * delta; if(c.position.x < -4000) c.position.x = 4000; });

            const bowler = players.find(p => p.role === 'bowler');
            if(bowler && !isEvacuating) {
                bowler.x += 16 * delta; if(bowler.x > -15) bowler.x = -55; bowler.rig.group.position.x = bowler.x;
                const bSwing = 0.6; const bCycle = Math.sin(time * 18);
                bowler.rig.lLeg.rotation.x = bCycle * bSwing; bowler.rig.rLeg.rotation.x = -bCycle * bSwing;
                bowler.rig.lArm.rotation.x = -bCycle * bSwing; bowler.rig.rArm.rotation.x = bCycle * bSwing;
            }

            // Living Parking Lot (Spawn Cars)
            carSpawnTimer -= delta;
            if(carSpawnTimer <= 0 && activeCars.length < 15 && !isEvacuating) {
                carSpawnTimer = 3.0 + Math.random() * 4.0;
                const cMat = new THREE.MeshStandardMaterial({color: carColors[Math.floor(Math.random()*carColors.length)]});
                const car = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 12), cMat);
                car.position.set(px + 400, 2, pz + (Math.random()-0.5)*80); car.castShadow = true; scene.add(car);
                const targetPos = new THREE.Vector3(px + (Math.random()-0.5)*350, 2, pz + (Math.random()-0.5)*350);
                activeCars.push({mesh: car, target: targetPos, state: 'driving'});
            }

            for(let c=activeCars.length-1; c>=0; c--) {
                let carObj = activeCars[c];
                if(carObj.state === 'driving') {
                    let cDir = new THREE.Vector3().subVectors(carObj.target, carObj.mesh.position); cDir.y = 0;
                    if(cDir.length() < 5) {
                        carObj.state = 'parked';
                        if(!isEvacuating) spawnAgents(2 + Math.floor(Math.random()*3), null, carObj.mesh.position);
                        activeCars.splice(c, 1); 
                    } else { cDir.normalize(); carObj.mesh.position.add(cDir.multiplyScalar(50 * delta)); carObj.mesh.lookAt(carObj.target); }
                }
            }

            gates.forEach(g => g.crowdDensity = 0);

            // Agent Logic (Evacuation, Concessions, VIPs)
            for(let i = agents.length - 1; i >= 0; i--) {
                const agent = agents[i];
                let isWalking = true;
                let targetPos = null;

                if (isEvacuating) {
                    if (!agent.evacTarget) {
                        const angle = Math.random() * Math.PI * 2;
                        agent.evacTarget = new THREE.Vector3(Math.cos(angle)*1500, 0, Math.sin(angle)*1500);
                        agent.speed *= 1.5; // Panic running!
                        agent.phase = 'EVACUATING';
                    }
                    targetPos = agent.evacTarget;
                    
                    // Remove if they get far enough away
                    if(agent.mesh.position.distanceTo(new THREE.Vector3(0,0,0)) > 1400) {
                        scene.remove(agent.mesh);
                        agents.splice(i, 1);
                        continue;
                    }
                } 
                else {
                    if (agent.rerouteCooldown > 0) agent.rerouteCooldown -= delta;

                    if(agent.phase === 'APPROACH_QUEUE') {
                        // Food Concession Detour
                        if (agent.wantsFood && !agent.hasEaten && agent.targetConcession) {
                            targetPos = agent.targetConcession.interactPos;
                            if(agent.mesh.position.distanceTo(targetPos) < 5) {
                                agent.foodWait -= delta;
                                isWalking = false;
                                if(agent.foodWait <= 0) agent.hasEaten = true;
                            }
                        } 
                        else {
                            if(agent.mesh.position.distanceTo(agent.targetGate.position) < 180) agent.targetGate.crowdDensity++;
                            targetPos = agent.targetGate.queueStart;

                            if(agent.targetGate.status === 'red' && agent.rerouteCooldown <= 0) {
                                let availableGates = gates.filter(g => g.status !== 'red' && g.id !== agent.targetGate.id);
                                if(availableGates.length > 0) {
                                    availableGates.sort((a, b) => a.crowdDensity - b.crowdDensity);
                                    agent.targetGate = availableGates[0];
                                    agent.rerouteCooldown = 8.0; 
                                }
                            }
                            if(agent.mesh.position.distanceTo(targetPos) < 10) agent.phase = 'IN_QUEUE';
                        }
                    } 
                    else if (agent.phase === 'IN_QUEUE') {
                        agent.targetGate.crowdDensity++;
                        targetPos = agent.targetGate.position; 
                        
                        if(agent.mesh.position.distanceTo(targetPos) < 5) {
                            if (agent.securityWait === undefined) agent.securityWait = agent.isVIP ? 0 : 1.0 + Math.random() * 3.0; 
                            
                            if (agent.securityWait > 0) {
                                agent.securityWait -= delta;
                                isWalking = false; 
                            } else {
                                agent.phase = 'SEATED';
                                newlySeatedCount++; // For live graph
                                const seatRad = 130 + Math.random() * 60; const seatAngle = Math.random() * Math.PI * 2;
                                let seatY = 15; if (seatRad > 160) seatY = 35; if (seatRad > 200) seatY = 55;
                                agent.mesh.position.set(Math.cos(seatAngle)*seatRad, seatY, Math.sin(seatAngle)*seatRad);
                                agent.mesh.lookAt(0, seatY, 0); 
                                isWalking = false;
                            }
                        }
                    }
                    else if (agent.phase === 'SEATED') {
                        isWalking = false;
                    }
                }

                if(isWalking && targetPos) {
                    let dir = new THREE.Vector3().subVectors(targetPos, agent.mesh.position); dir.y = 0; 
                    
                    if (agent.phase === 'APPROACH_QUEUE' || agent.phase === 'EVACUATING') {
                        const distToCenter = Math.hypot(agent.mesh.position.x, agent.mesh.position.z);
                        if (distToCenter < 360 && distToCenter > 100) {
                            const outward = new THREE.Vector3(agent.mesh.position.x, 0, agent.mesh.position.z).normalize();
                            const tangent = new THREE.Vector3(-outward.z, 0, outward.x);
                            const toTarget = new THREE.Vector3().subVectors(targetPos, agent.mesh.position).normalize();
                            if (tangent.dot(toTarget) < 0) tangent.negate();
                            dir.copy(tangent).add(outward.multiplyScalar(isEvacuating ? 0.8 : 0.6));
                        }
                    }
                    dir.normalize();

                    agent.mesh.position.add(dir.multiplyScalar(agent.speed * delta));
                    const lookTarget = new THREE.Vector3(agent.mesh.position.x + dir.x, agent.mesh.position.y, agent.mesh.position.z + dir.z);
                    agent.mesh.lookAt(lookTarget);

                    const swing = agent.speed * (isEvacuating ? 0.08 : 0.05);
                    const cycle = Math.sin(time * (isEvacuating ? 20 : 12) + agent.animOffset);
                    agent.rig.lLeg.rotation.x = cycle * swing; agent.rig.rLeg.rotation.x = -cycle * swing;
                    agent.rig.lArm.rotation.x = -cycle * swing; agent.rig.rArm.rotation.x = cycle * swing;
                } else {
                    agent.rig.lLeg.rotation.x = 0; agent.rig.rLeg.rotation.x = 0;
                    agent.rig.lArm.rotation.x = 0; agent.rig.rArm.rotation.x = 0;
                }
            }

            // CCTV Logic
            gates.forEach(gate => {
                let em = gate.indicator.material;
                if(gate.crowdDensity > 30) {
                    if(gate.status !== 'red') {
                        gate.status = 'red'; em.color.setHex(0xef4444); em.emissive.setHex(0xef4444);
                        if(!gate.alertTriggered && !isEvacuating) {
                            let availableGates = gates.filter(g => g.status !== 'red' && g.id !== gate.id);
                            let altGate = gate.id; 
                            if (availableGates.length > 0) { availableGates.sort((a, b) => a.crowdDensity - b.crowdDensity); altGate = availableGates[0].id; } 
                            else { altGate = ((gate.id % 5) + 1); }
                            triggerAppNotification('red', gate.id, altGate);
                            logAdmin(`> SECURITY: Gate ${gate.id} is blocked. Redirecting crowd.`, true);
                            gate.alertTriggered = true;
                        }
                    }
                } else if (gate.crowdDensity > 10) {
                    if(gate.status !== 'yellow') {
                        gate.status = 'yellow'; em.color.setHex(0xf59e0b); em.emissive.setHex(0xf59e0b);
                        if(!gate.alertTriggered && !isEvacuating) triggerAppNotification('yellow', gate.id, null);
                        gate.alertTriggered = false;
                    }
                } else {
                    gate.status = 'green'; em.color.setHex(0x10b981); em.emissive.setHex(0x10b981);
                    gate.alertTriggered = false;
                }
            });

            // Update Jumbotron
            jumboTimer += delta;
            if(jumboTimer > 1.0) {
                jumboTimer = 0;
                let seatedCount = agents.filter(a => a.phase === 'SEATED').length;
                updateJumbotron(seatedCount);
            }

            // Update Graph
            if(!isEvacuating) {
                graphTimer += delta;
                if(graphTimer > 1.0) {
                    graphTimer = 0;
                    ingressHistory.shift(); ingressHistory.push(newlySeatedCount); newlySeatedCount = 0;
                    drawGraph();
                }
            }

            // Draw Minimap
            miniCtx.clearRect(0, 0, 160, 160);
            miniCtx.beginPath(); miniCtx.arc(80, 80, 25, 0, Math.PI*2); miniCtx.strokeStyle = '#2a3143'; miniCtx.lineWidth = 2; miniCtx.stroke();
            agents.forEach(a => {
                const mx = 80 + (a.mesh.position.x / 1200) * 80; const mz = 80 + (a.mesh.position.z / 1200) * 80;
                if (mx > 0 && mx < 160 && mz > 0 && mz < 160) {
                    miniCtx.fillStyle = a.phase === 'SEATED' ? '#10b981' : (a.phase === 'IN_QUEUE' ? '#ef4444' : '#f59e0b');
                    miniCtx.fillRect(mx, mz, 2, 2);
                }
            });

            updateAdminDashboard();
            controls.update(); 
            renderer.render(scene, camera);
        }

        spawnAgents(60);
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
