<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fan Pass | Premium Command Center</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ==========================================
           PREMIUM CINEMATIC UI
           60-30-10 Color Palette + Layered Depth
           ========================================== */
        :root {
            --bg-dark: #040A15;      /* 60% Deepest Navy (Cinematic) */
            --panel-blue: #10213B;   /* 30% Slate Blue */
            --accent: #39FF88;       /* 10% Electric Green */
            --accent-cyan: #00E5FF;  /* Secondary glow */
            
            --text-primary: #F5F7FA;
            --text-muted: #8B9BB4;
            --warning: #FFB547;
            --danger: #FF4D4D;
            --glass-border: rgba(255, 255, 255, 0.08);
            --rim-light: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; font-weight: 600; letter-spacing: 0.5px; }

        /* ==========================================
           BACKGROUND LAYERS (Atmosphere & Depth)
           ========================================== */

        /* 1. Noise Texture */
        #noise-overlay {
            position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.03;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
        }

        /* 2. Soft Vignette */
        #vignette {
            position: fixed; inset: 0; z-index: 100; pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(4,10,21,0.85) 100%);
        }

        /* 3. Perspective Distortion Grid */
        .perspective-grid {
            position: fixed; bottom: 0; left: 0; width: 100vw; height: 70vh; z-index: -4;
            background-image: 
                linear-gradient(rgba(57, 255, 136, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57, 255, 136, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(800px) rotateX(75deg) translateY(100px);
            transform-origin: bottom center;
            -webkit-mask-image: linear-gradient(to top, black 10%, transparent 80%);
            pointer-events: none;
        }

        /* 4. Volumetric Floodlights */
        .floodlight {
            position: fixed; top: -20%; width: 250px; height: 150vh; z-index: -3;
            background: linear-gradient(to bottom, rgba(255,255,255,0.06) 0%, transparent 80%);
            filter: blur(25px); pointer-events: none;
        }
        .floodlight.left { left: 5%; transform: rotate(30deg); transform-origin: top center; }
        .floodlight.right { right: 5%; transform: rotate(-30deg); transform-origin: top center; }

        /* 5. Animated Ambient Mesh Orbs */
        .ambient-glow {
            position: fixed; border-radius: 50%; filter: blur(120px); 
            opacity: 0.35; z-index: -5; pointer-events: none;
            animation: floatBlob 30s ease-in-out infinite alternate;
        }
        .glow-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(16,33,59,0.8) 0%, transparent 60%); }
        .glow-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(57, 255, 136, 0.15) 0%, transparent 60%); animation-delay: -7s; }
