<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Particle Network</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <canvas id="sim-canvas"></canvas>

    <div class="control-panel">
        <h3 style="margin-bottom: 15px; color: #fff; font-size: 16px;">Network Controls</h3>
        
        <div class="control-grid">
            <div class="input-group">
                <label for="particle-count">Particle Count (<span id="count-val">100</span>)</label>
                <input type="range" id="particle-count" min="20" max="300" value="100">
            </div>

            <div class="input-group">
                <label for="speed-mult">Speed Multiplier (<span id="speed-val">1.0</span>x)</label>
                <input type="range" id="speed-mult" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>

            <div class="input-group">
                <label for="connect-dist">Connection Distance (<span id="dist-val">120</span>px)</label>
                <input type="range" id="connect-dist" min="50" max="300" value="120">
            </div>

            <div class="toggle-group">
                <label class="toggle-switch">
                    <input type="checkbox" id="toggle-lines" checked>
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">Show Connections</span>
            </div>

            <button id="btn-reset" class="btn-outline">Reset Simulation</button>
        </div>
    </div>

</body>
</html>
