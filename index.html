<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fan Pass | Premium Command Center</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <script src="script.js" defer></script>
</head>
<body>

    <div class="bg-gradient"></div>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
    <div id="mouse-glow"></div>

    <div class="wireframe tl"></div>
    <div class="wireframe tr"></div>
    <div class="abstract-geo top-left-geo"></div>
    <div class="abstract-geo top-right-geo"></div>

    <div class="data-stream" style="left: 10%; width: 2px; animation-duration: 4s; animation-delay: 1s; opacity: 0.4;"></div>
    <div class="data-stream" style="left: 25%; width: 1px; animation-duration: 7s; animation-delay: 0s; opacity: 0.2;"></div>
    <div class="data-stream" style="left: 45%; width: 3px; animation-duration: 5s; animation-delay: 2s; opacity: 0.5;"></div>
    <div class="data-stream" style="left: 70%; width: 1px; animation-duration: 8s; animation-delay: 0.5s; opacity: 0.3;"></div>
    <div class="data-stream" style="left: 88%; width: 2px; animation-duration: 6s; animation-delay: 1.5s; opacity: 0.6;"></div>

    <canvas id="particle-canvas"></canvas>

    <nav class="navbar">
        <div class="logo">
            <h1>SMART FAN PASS</h1>
        </div>
        <div class="nav-actions">
            <a href="simulation.html" target="_blank" class="btn-sim">
                <span class="live-dot"></span> LIVE 3D SIM ⧉
            </a>
            <button id="logoutBtn" class="logout-btn" onclick="logout()">Disconnect</button>
        </div>
    </nav>

    <div class="container">
        
        <div id="view-selector" class="view active">
            <div class="glass-card text-center hover-lift" style="max-width: 480px; margin: 0 auto;">
                <h2 style="margin-bottom: 8px; font-size: 28px;">Select Portal</h2>
                <p class="text-muted" style="margin-bottom: 35px; font-weight: 300;">Authenticate to access the stadium network.</p>
                
                <button class="btn btn-primary glow-btn" onclick="showView('view-fan-login')" style="margin-bottom: 15px;">FAN / CUSTOMER ACCESS</button>
                <button class="btn btn-outline" onclick="showView('view-mgmt-login')">MANAGEMENT COMMAND</button>
            </div>
        </div>

        <div id="view-fan-login" class="view">
            <div class="glass-card hover-lift" style="max-width: 420px; margin: 0 auto;">
                <h2 style="font-size: 24px; text-align: center; margin-bottom: 30px;">Fan Portal</h2>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fanName" placeholder="e.g. Virat Kohli">
                </div>
                <div class="form-group">
                    <label>Ticket Number</label>
                    <input type="text" id="fanTicket" placeholder="e.g. TKT-8493">
                </div>
                <button class="btn btn-primary glow-btn" style="margin-bottom: 15px;" onclick="loginFan()">AUTHENTICATE</button>
                <button class="btn btn-text" style="width: 100%;" onclick="showView('view-selector')">← Back</button>
            </div>
        </div>

        <div id="view-mgmt-login" class="view">
            <div class="glass-card hover-lift" style="max-width: 420px; margin: 0 auto;">
                <h2 style="font-size: 24px; text-align: center; margin-bottom: 30px;">Command Center</h2>
                <div class="form-group">
                    <label>Admin PIN (Hint: 1234)</label>
                    <input type="password" id="adminPin" placeholder="****">
                </div>
                <button class="btn btn-primary glow-btn" style="margin-bottom: 15px;" onclick="loginMgmt()">AUTHENTICATE</button>
                <button class="btn btn-text" style="width: 100%;" onclick="showView('view-selector')">← Back</button>
            </div>
        </div>

        <div id="view-fan-dash" class="view">
            <div class="glass-card text-center">
                <h2 style="margin-bottom: 20px;">Network Access Granted</h2>
                <p class="text-muted">Welcome to the stadium network, <span id="displayFanName" style="color: var(--accent);"></span>.</p>
            </div>
        </div>
        <div id="view-mgmt-dash" class="view">
            <div class="glass-card text-center">
                <h2 style="margin-bottom: 20px;">Command Center Online</h2>
                <p class="text-muted">Routing matrix active.</p>
            </div>
        </div>

    </div>
</body>
</html>
